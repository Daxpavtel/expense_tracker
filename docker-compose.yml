version: '3.8'
services:
  mongodb:
    image: mongo:7
    container_name: expense-tracker-db
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: expense-tracker-api
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/expense-tracker
      JWT_SECRET: change_this_to_a_random_secret_key
    env_file:
      - ./server/.env

volumes:
  mongo_data:
